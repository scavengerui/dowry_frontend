<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dowry Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="logo">Dowry Calculator</div>
      <p class="tagline">Upload a photo to discover the AI's prediction.</p>
    </header>

    <main class="main">
      <section class="card">
        <h1 class="card-title">Upload a face photo</h1>
        <p class="card-subtitle">
          We send your photo to the backend <code>/calculate</code> route and show the AI's fun reply.
        </p>

        <form id="dowry-form" class="form">
          <label class="file-label">
            <span class="file-label-text" id="file-label-text">Select Image</span>
            <input id="photo-input" type="file" name="face" accept="image/*" required />
          </label>

          <button id="submit-btn" type="submit" class="btn-primary">
            Send to AI
          </button>
        </form>

        <div id="status" class="status"></div>

        <div id="result" class="result hidden"></div>
      </section>
    </main>

    <footer class="footer">
      <span>Backend route used: <code>POST /calculate</code></span>
    </footer>
  </div>

  <!-- Password Modal -->
  <div id="password-modal" class="modal hidden">
    <div class="modal-content card">
      <h2 class="card-title">Enter Password</h2>
      <p class="card-subtitle" style="margin-bottom: 1.5rem;">Please enter the password or API key to proceed.</p>
      <input type="password" id="modal-password-input" class="modal-input" placeholder="Password..." />
      <div class="modal-actions">
        <button type="button" id="modal-cancel-btn" class="btn-secondary">Cancel</button>
        <button type="button" id="modal-submit-btn" class="btn-primary"
          style="padding: 0.9rem 1.5rem; box-shadow: none;">Submit</button>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>

</html>
